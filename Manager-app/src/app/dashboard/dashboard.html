<h1>Dashboard</h1>

<div class="cards">

  <div class="card">
    <h3>Total Tasks</h3>
    <p>{{ totalTasks }}</p>
  </div>

  <div class="card">
    <h3>Completed Tasks</h3>
    <p>{{ completedTasks }}</p>
  </div>

  <div class="card">
    <h3>Pending Tasks</h3>
    <p>{{ pendingTasks }}</p>
  </div>

</div>
