<div class="task-container">

  <div class="task-card">

    <h2 class="title">ADD TASK</h2>

    <!-- VIEW MODE -->
    <div *ngIf="!isEdit" class="view-mode">

      <div class="row">
        <div class="field">
          <label>Title</label>
          <p>{{ task.title }}</p>
        </div>

        <div class="field">
          <label>Assigned To</label>
          <p>{{ task.assignedTo }}</p>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Priority</label>
          <p
            class="priority-badge"
            [ngClass]="{
              'high': task.priority === 'High',
              'medium': task.priority === 'Medium',
              'low': task.priority === 'Low'
            }"
          >
            {{ task.priority }}
          </p>
        </div>

        <div class="field">
          <label>Due Date</label>
          <p>{{ task.dueDate }}</p>
        </div>
      </div>

      <div class="row">
        <div class="field full">
          <label>Status</label>
          <p
            class="status-badge"
            [ngClass]="{
              'pending': task.status === 'Pending',
              'completed': task.status === 'Completed'
            }"
          >
            {{ task.status }}
          </p>
        </div>
      </div>

      <div class="actions">
        <button class="edit-btn" (click)="enableEdit()">Edit</button>
        <button class="back-btn" (click)="goBack()">Back</button>
      </div>

    </div>

    <!-- EDIT MODE -->
    <div *ngIf="isEdit" class="edit-mode">

      <form #taskForm="ngForm">

        <div class="row">
          <div class="field">
            <label>Title</label>
            <input
              [(ngModel)]="task.title"
              name="title"
              required
              #title="ngModel"
              [ngClass]="{ 'invalid': title.invalid && title.touched }"
            />
            <small *ngIf="title.invalid && title.touched">Title is required</small>
          </div>

          <div class="field">
            <label>Assigned To</label>
            <input
              [(ngModel)]="task.assignedTo"
              name="assignedTo"
              required
              #assignedTo="ngModel"
              [ngClass]="{ 'invalid': assignedTo.invalid && assignedTo.touched }"
            />
            <small *ngIf="assignedTo.invalid && assignedTo.touched">
              Assigned To is required
            </small>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Priority</label>
            <select
              [(ngModel)]="task.priority"
              name="priority"
              required
              #priority="ngModel"
              [ngClass]="{ 'invalid': priority.invalid && priority.touched }"
            >
              <option value="" disabled>Select the Priority</option>
              <option>High</option>
              <option>Medium</option>
              <option>Low</option>
            </select>
            <small *ngIf="priority.invalid && priority.touched">
              Priority is required
            </small>
          </div>

          <div class="field">
            <label>Due Date</label>
            <input
              type="date"
              [(ngModel)]="task.dueDate"
              name="dueDate"
              required
              #dueDate="ngModel"
              [ngClass]="{ 'invalid': dueDate.invalid && dueDate.touched }"
            />
            <small *ngIf="dueDate.invalid && dueDate.touched">
              Due Date is required
            </small>
          </div>
        </div>

        <div class="row">
          <div class="field full">
            <label>Status</label>
            <select
              [(ngModel)]="task.status"
              name="status"
              required
              #status="ngModel"
              [ngClass]="{ 'invalid': status.invalid && status.touched }"
            >
              <option value="" disabled>Select the Status</option>
              <option>Pending</option>
              <option>Completed</option>
            </select>
            <small *ngIf="status.invalid && status.touched">
              Status is required
            </small>
          </div>
        </div>

      </form>

      <div class="actions">
        <button class="save-btn" [disabled]="taskForm.invalid" (click)="saveTask(taskForm)">
          Save
        </button>

        <button class="cancel-btn" type="button" (click)="goBack()">
          Cancel
        </button>
      </div>

    </div>

  </div>

</div>
