<h2>Task List</h2>

<table class="task-table">
  <thead>
    <tr>
      <th>Task Title</th>
      <th>Assigned To</th>
      <th>Priority</th>
      <th>Due Date</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let task of tasks"
        [ngClass]="{ 'high-priority-row': task.priority === 'High' }">

      <td>{{ task.title }}</td>
      <td>{{ task.assignedTo }}</td>
      <td>{{ task.priority }}</td>
      <td>{{ task.dueDate }}</td>

      <td>
        <span
          [class.completed]="task.status === 'Completed'"
          [class.pending]="task.status === 'Pending'">
          {{ task.status }}
        </span>
      </td>

      <td>
        <button class="view-btn" (click)="viewTask(task)">View</button>
        <button class="complete-btn" (click)="markComplete(task)">Complete</button>
        <button class="delete-btn" (click)="deleteTask(task)">Delete</button>
      </td>

    </tr>
  </tbody>
</table>
